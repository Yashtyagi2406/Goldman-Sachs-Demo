<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API - Minimalist Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-8">

    <div class="max-w-2xl mx-auto">
        <div class="flex items-center justify-between mb-8 border-b border-gray-200 pb-4">
            <h1 class="text-2xl font-light tracking-tight">Users</h1>
            <button id="loadBtn" class="bg-black text-white px-5 py-2 text-sm font-medium rounded hover:bg-gray-800 transition-colors duration-200">
                Load Users
            </button>
        </div>

        <div id="userContainer" class="space-y-4">
            </div>
    </div>

<script>
    const btn = document.querySelector("#loadBtn");
    const container = document.querySelector("#userContainer");

    btn.addEventListener("click", loadUsers);

    async function loadUsers() {
        btn.textContent = "Loading...";
        btn.disabled = true;

        try {
            const response = await fetch("https://jsonplaceholder.typicode.com/users");
            const data = await response.json();

            container.innerHTML = "";

            data.forEach(user => {
                const userCard = document.createElement("div");
                
                userCard.className = "p-5 bg-white border border-gray-100 rounded-lg shadow-sm hover:shadow-md transition-shadow duration-200";
                
                userCard.innerHTML = `
                    <h2 class="text-lg font-medium text-gray-900">${user.name}</h2>
                    <p class="text-sm text-gray-500 mt-1">${user.email}</p>
                    <p class="text-xs text-gray-400 mt-2">@${user.username}</p>
                `;
                
                container.appendChild(userCard);
            });
            
        } catch (error) {
            console.error("Error fetching users:", error);
            container.innerHTML = `<p class="text-red-500 text-sm">Failed to load users. Please try again.</p>`;
        } finally {
            btn.textContent = "Load Users";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
