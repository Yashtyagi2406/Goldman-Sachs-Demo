<!DOCTYPE html>
<html lang="en">
<head>
    <title>Event Listeners Example</title>
</head>
<body>

<h2>JavaScript Event Listeners Demo</h2>

<!-- Click Event -->
<button id="btn">Click Me</button>
<p id="clickText"></p>

<!-- Mouseover Event -->
<div id="box" style="width:200px;height:100px;background:lightblue;margin-top:20px;">
    Hover over me
</div>

<br><br>

<!-- Keydown Event -->
<input type="text" id="keyboard" placeholder="Type something">

<br><br>

<!-- Change Event -->
<select id="dropdown">
    <option value="">Select Language</option>
    <option value="JavaScript">JavaScript</option>
    <option value="Python">Python</option>
    <option value="C++">C++</option>
</select>

<p id="output"></p>

<script src="script.js"></script>

</body>
</html>
