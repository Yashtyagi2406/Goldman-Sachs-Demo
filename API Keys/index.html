<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Helper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 min-h-screen flex flex-col justify-center items-center p-4 font-sans text-gray-800">

    <div class="w-full max-w-2xl bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        
        <div class="h-32 bg-gradient-to-r from-indigo-500 to-purple-600 flex items-center justify-center relative overflow-hidden">
            <div class="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
            <h1 class="text-4xl font-extrabold text-white z-10 drop-shadow-md tracking-tight flex items-center">
                <i class="fas fa-graduation-cap mr-3"></i> AI Study Helper
            </h1>
        </div>

        <div class="p-8 sm:p-10">
            <div class="relative">
                <textarea id="question" rows="4" 
                    class="w-full px-5 py-4 text-gray-700 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all resize-none shadow-inner text-lg" 
                    placeholder="What would you like to learn today? Ask any study question..."></textarea>
            </div>

            <button id="askBtn" onclick="askAI()" 
                class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-2xl shadow-lg hover:shadow-indigo-500/30 transition-all duration-300 transform hover:-translate-y-1 flex justify-center items-center text-lg">
                <i class="fas fa-sparkles mr-2"></i> Ask AI
            </button>

            <div id="answerBox" class="mt-8 hidden transition-all duration-500 ease-in-out">
                <h3 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                    <i class="fas fa-robot text-indigo-500 mr-2"></i> AI Answer
                </h3>
                <div id="answer" class="bg-indigo-50 border border-indigo-100 p-6 rounded-2xl max-h-96 overflow-y-auto whitespace-pre-wrap text-gray-700 leading-relaxed shadow-inner text-base"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
