<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gemini API Example</title>
</head>

<body>

<h2>Aaj Hum API Key use karenge...</h2>

<input id="prompt" placeholder="Enter question">
<button onclick="askGemini()">Ask Gemini</button>

<p id="output"></p>

<script>

const API_KEY = "AIzaSyA57AdquI7L1V3Esb-gc1qcBzI9pHP0QHI";

async function askGemini() {

  const userText = document.getElementById("prompt").value;

  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        contents: [
          {
            parts: [{ text: userText }]
          }
        ]
      })
    }
  );

  const data = await response.json();

  const result = data.candidates[0].content.parts[0].text;

  document.getElementById("output").innerText = result;
}

</script>

</body>
</html>
